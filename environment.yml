name: mdclaw
channels:
  - conda-forge
dependencies:
  - python=3.12
  # --- conda-only or conda-preferred ---
  - ambertools>=24.0
  - pdbfixer>=1.9
  - rdkit>=2023.9.1
  - openblas
  - matplotlib
  - pymol-open-source
  - pymbar>=4.2.0,<5
  # --- openmmforcefields-unification (PR3+) ---
  # OpenMM 8.5.1 is the floor for openmmforcefields>=0.15.1; 8.6 brings
  # SourceWithCMAP fixes used by the ff19SB and phosaa19SB conversions.
  - openmm>=8.5.1
  # Cap the CUDA build of OpenMM below the 13.x series. conda-forge bakes the
  # CUDA toolkit its NVRTC was built against into each OpenMM build, and the
  # PTX that NVRTC emits at runtime must be JIT-compilable by the *cluster's*
  # GPU driver. A 13.x build needs driver >=R580; on common HPC drivers it
  # fails silently with CUDA_ERROR_UNSUPPORTED_PTX_VERSION. Capping at <13
  # deterministically selects the 12.9 build (driver >=R575) regardless of the
  # solve-time driver, with no GPU-coverage loss (Volta..Blackwell). NOTE:
  # conda-forge has no <12.9 CUDA build for OpenMM>=8.5, so drivers older than
  # R575 (e.g. CUDA 12.8 / driver 570) cannot run ANY conda CUDA build of
  # OpenMM -- use the container/SIF (source-built against CUDA 11.8, driver
  # >=R520) or run with `--platform OpenCL`.
  - cuda-version>=12.0,<13
  - openmmforcefields>=0.16.0
  - openff-toolkit-base>=0.17.1
  - openff-nagl>=0.5
  # openff-pablo runtime deps (per its README: rustworkx for graph algos,
  # pyxdg for XDG_CACHE_HOME resolution of the CCD download cache).
  - rustworkx>=0.14
  - pyxdg>=0.28
  # HPacker uses torch at import time. Keep this on conda-forge to avoid
  # mixing pkgs/main PyTorch with conda-forge protobuf on macOS.
  - pytorch>=2.7,<2.8
  # openmm-torch (openmmtorch) backs production custom force / CV bias plugins
  # (PythonTorchForce for agent-written energy scripts, TorchForce for
  # pre-trained .pt models). conda-forge builds it against the matching
  # openmm + pytorch ABI, so keep it on conda-forge alongside both.
  - openmm-torch>=1.5
  # --- pip dependencies (delegated to pyproject.toml) ---
  - pip
  - pip:
    - -e .
    - e3nn==0.5.0
    - hpacker @ git+https://github.com/gvisani/hpacker.git
    # openff-pablo is pre-1.0 and not yet on conda-forge / PyPI; install
    # the 0.2.2 git tag and pin to <0.3 to absorb expected API churn
    # before the openff-pablo team cuts a stable release.
    - openff-pablo @ git+https://github.com/openforcefield/openff-pablo.git@v0.2.2
