[project]
name = "mdzen"
version = "0.3.0"
description = "MDZen - AI-powered Molecular Dynamics Setup (MD + 膳/禅)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # MCP Server
    "fastmcp>=2.0.0,<3.0.0",
    "mcp[cli]>=1.18.0",

    # Structure prediction & modeling
    # Note: Install openmm, rdkit, mdanalysis, biopython, pandas, numpy, scipy, pdbfixer via conda first
    # conda install -c conda-forge openmm rdkit mdanalysis biopython pandas numpy scipy openblas pdbfixer
    "pdb2pqr>=3.1.0",
    "propka>=3.5.0",
    "gemmi>=0.6.0",
    "dimorphite-dl>=1.3.2",
    "pubchempy>=1.0.4",

    # Topology manipulation
    "parmed>=4.3.0",

    # Data models & validation
    "pydantic>=2.12.3",
    "pydantic-settings>=2.0.0",

    # HTTP & networking
    "httpx>=0.28.1",
    "requests>=2.31.0",

    # Utilities
    "python-dotenv>=1.0.0",

    # Visualization & analysis
    "mdtraj>=1.9.0",
]

[project.optional-dependencies]
heavy = [
    "openmm>=8.3.1",
    "mdanalysis>=2.10.0",
    "rdkit>=2023.9.1",
    "biopython>=1.83",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
]

[project.scripts]
mdzen-mcp = "mdzen.mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["servers", "common", "src/mdzen"]

[tool.pytest.ini_options]
markers = [
    "slow: tests requiring conda scientific packages (deselect with '-m not slow')",
    "integration: full pipeline tests (deselect with '-m not integration')",
]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"
